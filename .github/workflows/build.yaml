name: telemetry-collector

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: v${{ github.run_number }}

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build \
          -t ghcr.io/${{ github.repository_owner }}/telemetry-collector:${{ env.IMAGE_TAG }} \
          .

      - name: Push Image
        run: |
          docker push \
          ghcr.io/${{ github.repository_owner }}/telemetry-collector:${{ env.IMAGE_TAG }}
          
      - name: Clone GitOps Repo
        run: |
          git clone \
          https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/sridevi0616/telemetry-gitops.git

      - name: Update Helm Image Tag
        run: |
         cd telemetry-gitops
         sed -i \
         "s/tag:.*/tag: \"${{ env.IMAGE_TAG }}\"/" \
         telemetry-chart/values.yaml 
      - name: Commit Changes
        run: |

          cd telemetry-gitops
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add .
          git commit -m \
          "Update collector image tag ${{ env.IMAGE_TAG }}" \
          || echo "No changes"   
          git push
