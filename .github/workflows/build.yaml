name: Build and Push Collector

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: v${{ github.run_number }}

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build \
          -t ghcr.io/${{ github.repository_owner }}/telemetry-collector:${{ env.IMAGE_TAG }} \
          .

      - name: Push Image
        run: |
          docker push \
          ghcr.io/${{ github.repository_owner }}/telemetry-collector:${{ env.IMAGE_TAG }}
